# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Transcript Cleanup Formatting Autonomous Handoff"
  slug: "transcript-cleanup-formatting-handoff"
  kind: existing_plan
  tranche: "Prepare and execute an autonomous handoff for implementing the approved transcript cleanup formatting feature."
  status: done
  oracle:
    signal: "Focused tests and final audit prove optional cleanup formatting, independent cleanup routing, prompt/preferred-term assembly, raw fallback, final-text-only history, diagnostic redaction, and Settings UI behavior."
    cadence: "after each Worker package and at final audit"
    final_proof: "Receipts list changed files and passing commands for unit/UI tests plus a final audit mapping implementation evidence back to the approved spec."
  intake:
    original_request: "Prepare this plan to hand off to the MacBook Air agent so it can run autonomously with as little blocking and manual input as possible."
    interpreted_outcome: "A durable GoalBuddy handoff and implementation plan let the MacBook Air Codex agent implement transcript cleanup formatting autonomously and produce a PR-ready branch."
    input_shape: existing_plan
    audience: "MacBook Air Codex agent and Foil maintainer"
    authority: requested
    proof_type: test
    completion_proof: "A final audit maps receipts to the approved design spec and targeted passing tests for cleanup routing, prompt assembly, fallback, history, diagnostics, and Settings UI."
    likely_misfire: "Only adding an editable prompt or UI toggle while leaving independent provider routing, privacy/redaction, fallback behavior, or proof incomplete."
    blind_spots_considered:
      - "docs/goals/ is currently ignored in this worktree, so publishing this handoff requires explicit staging or a different tracked path."
      - "The remote machine may not have live provider API keys; mocked tests must prove the behavior."
      - "Cleanup provider routing is privacy-sensitive and must be explicit in UI, code, and tests."
      - "Custom prompts and preferred terms are sensitive and must not be written to diagnostics."
    existing_plan_facts:
      - "Approved spec: docs/superpowers/specs/2026-06-19-transcript-cleanup-formatting-design.md"
      - "Existing code already has TranscriptProcessingMode, TranscriptionController.processTranscriptOrRaw, TranscriptionService.processTranscript, cleanup provider settings, and cleanupFailed plumbing."
      - "User approved cleanup formatting first, custom prompt per mode, preferred terms list, independent cleanup provider, raw fallback warning, and final pasted text only in history."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/transcript-cleanup-formatting-handoff/"
    command: "npx goalbuddy board docs/goals/transcript-cleanup-formatting-handoff"

