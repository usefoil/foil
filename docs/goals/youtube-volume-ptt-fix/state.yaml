      - "Goal oracle"
      - "Non-negotiable constraints"
    constraints:
      - "Do not implement."
      - "Reject mitigations that only document the issue without preventing the verified default/recommended bad path."
      - "Reject private API, UI scripting, or direct manipulation of Chrome/YouTube/system output volume."
      - "Prefer a reversible local product behavior change with deterministic tests plus a live smoke plan."
    expected_output:
      - "Decision: approved | blocked | needs_more_scouting"
      - "Exact Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
      - "Deferred follow-up tasks, if any"
    receipt:
