version: 2

goal:
  title: "Fix YouTube Volume Jump During Push-To-Talk"
  slug: "youtube-volume-ptt-fix"
  kind: specific
  tranche: "Discover the precise audio-route failure boundary, implement the largest safe mitigation, and verify that the default or recommended Foil recording path no longer changes YouTube/system output volume during PTT."
  status: active
  oracle:
    signal: "With YouTube playing in Chrome and AirPods connected, a Foil push-to-talk recording on the default/recommended configuration keeps macOS output volume stable in repeated before/during/after samples, correlated with Foil diagnostics."
    cadence: "after each Worker package and at final audit"
    final_proof: "A final live smoke receipt records before/during/after output-volume samples, active input/output device state, Foil diagnostic lines, and focused automated test results; completion requires no 38-to-50 style jump on the fixed/recommended path."
  intake:
    original_request: "Make a detailed plan using GoalBuddy Prep to fix the YouTube volume increase while holding Foil push-to-talk."
    interpreted_outcome: "Foil should no longer cause YouTube playback to get louder while push-to-talk recording is held, or should safely steer users away from the macOS/Bluetooth configuration that causes it."
    input_shape: specific
    audience: "Foil users who listen to YouTube or other playback while dictating, especially with AirPods or Bluetooth headsets."
    authority: requested
    proof_type: test
    completion_proof: "Focused tests plus a live local YouTube/AirPods smoke show stable macOS output volume during Foil PTT on the default/recommended path."
    likely_misfire: "Only adding a warning, disabling browser media control, or asserting Foil does not set volume while leaving the AirPods default-input path able to change output volume during recording."
    blind_spots_considered:
      - "macOS may maintain separate output volume levels per AirPods Bluetooth profile or route."
      - "Foil may not be able to prevent a Bluetooth profile switch if the Bluetooth microphone is selected."
      - "Automatically changing the system default input may be intrusive and must be bounded, explicit, and restorable where possible."
      - "Live proof depends on hardware state and must record exact input/output devices and sample rates."
      - "Chrome's YouTube video element volume could not be inspected because JavaScript from Apple Events is disabled; system volume polling is the stronger local signal."
      - "Cue sound loudness is separate from YouTube volume and should not be mistaken for the root issue."
    existing_plan_facts:
      - "Installed app log at 23:52:01 showed Foil recording started, otherAudio policy none, and browser media skipped."
      - "System volume polling showed output volume 38 before recording, 50 while recording, and 38 after stop."
      - "AirPods were default input and default output during the verified symptom."
      - "Source search found no system output-volume setter in Foil."
      - "AudioRecorder can enumerate input devices and transport metadata, including Bluetooth and built-in."
      - "Settings already contains Bluetooth input warning treatment, but it did not prevent this verified default-input scenario."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/youtube-volume-ptt-fix/"
    command: "npx goalbuddy board docs/goals/youtube-volume-ptt-fix"
    note: "The output-volume sampler now works locally; the remaining required proof is the live YouTube/headphones PTT smoke with operator-held PTT."

active_task: T008

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map the verified volume-jump failure boundary and identify the smallest public-API-safe mitigation candidates."
    inputs:
      - "Verified symptom: system output volume 38 -> 50 at Foil recording start, then 50 -> 38 at stop while YouTube played."
      - "docs/acceptance-evidence.md"
      - "Foil/AudioRecorder.swift"
      - "Foil/AppState.swift"
      - "Foil/SettingsView.swift"
      - "Foil/BluetoothMicGuidance.swift"
      - "Foil/DiagnosticLog.swift"
      - "Foil/RecordingController.swift"
      - "Foil/FoilApp.swift"
      - "Relevant tests under FoilTests and FoilUITests"
      - "Existing notes under docs/goals/other-audio-recording-policy/"
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Prefer direct code paths, diagnostics, and local command evidence over speculation."
      - "Separate system output-volume changes, YouTube player volume, Foil cue volume, browser media control, and Bluetooth input-mode effects."
      - "Do not require private APIs or third-party app volume control."
    expected_output:
      - "Failure boundary: which component likely changes volume and why."
      - "Evidence gaps that must be closed before implementation."
      - "Ranked mitigation candidates with public API feasibility."
      - "Recommended first Worker package with allowed_files, verify commands, and stop conditions."
    receipt:
      result: done
      summary: "Mapped the failure boundary: installed Foil does not intentionally control browser media or system output volume, but using System Default input when macOS default input/output are AirPods opens a Bluetooth mic path that coincided exactly with the 38 -> 50 -> 38 macOS output-volume jump during PTT."
      evidence:
        - "Foil/AudioRecorder.swift: startRecording uses AVAudioEngine input capture; prepareInputDeviceForRecording only sets default input when selectedInputDeviceUID is explicit."
        - "Foil/SoundPlayer.swift: only direct volume setter is Foil cue NSSound.volume = 1.0, separate from YouTube playback."
        - "Foil/BrowserMediaController.swift: disabled path logs otherAudio unaffected and browserMediaControl skipped."
        - "Foil/SettingsView.swift and Foil/BluetoothMicGuidance.swift: current Bluetooth treatment warns but does not prevent the risky System Default input path."
        - "docs/goals/other-audio-recording-policy/notes/T004-bluetooth-input-scout.md: prior Scout identified AirPods default input/output as risky and recommended warning only."
        - "Verified investigation facts in this goal: output volume changed 38 -> 50 at Foil start and 50 -> 38 at Foil stop while diagnostics showed policy=none and browser media skipped."
      failure_boundary: "The likely boundary is macOS Bluetooth/per-route output volume when Foil opens the active default input, not Foil's browser media control or a direct output-volume API."
      mitigation_candidates:
        - "Highest confidence: introduce a safe recording input policy that prefers a built-in/non-Bluetooth mic when System Default resolves to Bluetooth and Bluetooth output is active, while preserving explicit Bluetooth selection."
        - "Also needed: richer diagnostics that log effective input identity/transport and output identity/transport at recording start/stop so live proof can distinguish default-input, selected-input, and route-volume behavior."
        - "UI follow-through: make Settings guidance actionable for System Default + Bluetooth input, not only for explicit Bluetooth selection."
        - "Verification support: add a reusable installed-app smoke/runbook that samples output volume before/during/after PTT and captures Foil diagnostics."
      evidence_gaps:
        - "Need a post-change live YouTube/AirPods smoke to prove the fixed/recommended path keeps output volume stable."
        - "Need deterministic unit tests around any new input-policy chooser; current tests only cover transport mapping/warnings."
        - "Need to decide whether automatic non-Bluetooth preference is default behavior or a guided setting."
      recommended_first_worker:
        objective: "Add a deterministic input-policy layer that, when selectedInputDeviceUID is nil and the effective system default input is Bluetooth, prefers a built-in/non-Bluetooth input for recording if available; preserve explicit user selection and log the policy decision."
        allowed_files:
          - "Foil/AudioRecorder.swift"
          - "Foil/AppState.swift"
          - "Foil/DiagnosticLog.swift"
          - "FoilTests/AudioRecorderTests.swift"
          - "FoilTests/AppStateTests.swift"
          - "FoilTests/DiagnosticLogTests.swift"
        verify:
          - "xcodebuild test -project Foil.xcodeproj -scheme Foil -destination 'platform=macOS' -only-testing:FoilTests/AudioRecorderTests -only-testing:FoilTests/AppStateTests -only-testing:FoilTests/DiagnosticLogTests"
          - "git diff --check"
        stop_if:
          - "The policy would silently override an explicit user-selected Bluetooth input."
          - "No non-Bluetooth input exists and the code cannot fall back cleanly."
          - "The change requires private APIs or direct output-volume manipulation."

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Choose the largest safe first implementation slice that can plausibly stop the volume jump on the recommended/default path."
    inputs:
