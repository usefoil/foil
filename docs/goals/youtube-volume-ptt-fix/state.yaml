      decision: approved
      full_outcome_complete: false
      rationale: "T001 evidence shows the existing warning-only treatment did not prevent the verified System Default/AirPods path. The largest safe first slice is to make the default recording path avoid Bluetooth headset microphones when a non-Bluetooth input is available, while preserving explicit user selection and avoiding output-volume APIs."
      worker_objective: "Implement automatic Bluetooth-default input avoidance for recording: when selectedInputDeviceUID is nil and the effective system default input transport is Bluetooth/Bluetooth LE, choose a built-in/non-Bluetooth input for the recording if available, align the input device as needed, and log the policy decision."
      allowed_files:
