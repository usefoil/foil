        - "Foil/DiagnosticLog.swift"
        - "FoilTests/AudioRecorderTests.swift"
        - "FoilTests/AppStateTests.swift"
        - "FoilTests/DiagnosticLogTests.swift"
        - "docs/goals/youtube-volume-ptt-fix/state.yaml"
      verify:
        - "xcodebuild test -project Foil.xcodeproj -scheme Foil -destination 'platform=macOS' -only-testing:FoilTests/AudioRecorderTests -only-testing:FoilTests/AppStateTests -only-testing:FoilTests/DiagnosticLogTests"
        - "git diff --check"
      stop_if:
