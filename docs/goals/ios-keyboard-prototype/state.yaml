      - "FoiliOS/FoilIOS.xcodeproj/**"
      - "FoiliOS/FoilIOSApp/**"
      - "FoiliOS/FoilKeyboard/**"
      - "FoiliOS/Shared/**"
      - "FoiliOS/Tests/**"
      - "docs/goals/ios-keyboard-prototype/state.yaml"
    verify:
      - "cd FoiliOS && xcodegen generate --spec project.yml"
      - "xcodebuild -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.5' build"
      - "git diff --check"
    stop_if:
      - "Need files outside allowed_files."
      - "Xcode project generation strategy is ambiguous."
      - "Simulator build cannot be made to run after two focused fixes."
      - "A secret value would need to be committed."
    receipt:
