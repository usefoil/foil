      - "Current git status"
    constraints:
      - "Do not implement."
      - "Choose the largest safe useful slice with explicit allowed_files, verification commands, and stop conditions."
      - "Prefer a slice that can become PR 1 into codex/ios-keyboard-prototype."
    expected_output:
      - "Decision: approved, blocked, or needs narrower scout."
      - "Exact Worker objective."
      - "PR branch name and base branch."
      - "allowed_files."
      - "verify commands for simulator build/run."
      - "stop_if conditions."
    receipt:
      result: done
      task_id: T002
      board_path: "docs/goals/ios-keyboard-prototype/state.yaml"
      decision: approved
      full_outcome_complete: false
      rationale: "Approve a contained PR 1 using XcodeGen under FoiliOS/. This avoids destabilizing the mature macOS Foil.xcodeproj while still producing a real iOS app plus keyboard-extension shell that can build on simulator and become the base for later handoff, microphone, transcription, and insertion PRs."
      evidence:
        - "T001 found Foil.xcodeproj currently has only macOS schemes/targets."
        - "command -v xcodegen returned /opt/homebrew/bin/xcodegen."
        - "xcodebuild -version returned Xcode 26.5 build 17F42."
        - "xcrun simctl discovered iOS 26.5 iPhone 17 simulator."
        - "git status shows only the new GoalBuddy board plus pre-existing unrelated untracked files."
      subgoal_contract: null
      parallel_safety: null
      blocked_tasks: []
      missing_evidence:
        - "Physical preview-iPhone proof remains blocked until iPhone-preview is online; this does not block simulator-only PR 1."
      required_board_updates:
        - "Set T003 allowed_files to FoiliOS prototype files and docs/goals/ios-keyboard-prototype/state.yaml."
        - "Set T003 verify commands to xcodegen generation and simulator build."
        - "Use PR branch codex/ios-prototype-project-shell with base codex/ios-keyboard-prototype."

