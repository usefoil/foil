      pull_request: "https://github.com/mean-weasel/foil/pull/218"
      merged_at: "2026-06-04T12:24:40Z"
      evidence:
        - "/tmp/foil-ios-keyboard-prototype/pr2-fake-transcript-ready.jpg"
        - "XcodeBuildMCP snapshot text contained Transcript Ready, Fake transcript ready, and Foil keyboard shell."
      residual_risk:
