        - "FoiliOS/FoilIOS.xcodeproj/project.pbxproj"
        - "FoiliOS/FoilIOS.xcodeproj/project.xcworkspace/contents.xcworkspacedata"
        - "FoiliOS/FoilIOSApp/ContentView.swift"
        - "FoiliOS/FoilIOSApp/FoilIOSApp.swift"
        - "FoiliOS/FoilIOSApp/Generated/Info.plist"
        - "FoiliOS/FoilKeyboard/Generated/Info.plist"
        - "FoiliOS/FoilKeyboard/KeyboardViewController.swift"
        - "FoiliOS/Shared/FoilIOSConstants.swift"
      commands:
        - cmd: "cd FoiliOS && xcodegen generate --spec project.yml"
          status: pass
        - cmd: "xcodebuild -project FoilIOS.xcodeproj -scheme FoilIOS -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.5' build"
          status: pass
        - cmd: "xcrun simctl bootstatus 8A7EA28F-4690-4816-B650-38648E6F44FB -b"
          status: pass
        - cmd: "xcrun simctl install 8A7EA28F-4690-4816-B650-38648E6F44FB '/Users/neonwatty/Library/Developer/Xcode/DerivedData/FoilIOS-etjpnlgwpgrmogdamhcddquunbkh/Build/Products/Debug-iphonesimulator/Foil iOS.app'"
          status: pass
        - cmd: "xcrun simctl launch 8A7EA28F-4690-4816-B650-38648E6F44FB com.neonwatty.FoilIOS"
          status: pass
        - cmd: "xcrun simctl io 8A7EA28F-4690-4816-B650-38648E6F44FB screenshot /tmp/foil-ios-keyboard-prototype/pr1-app-shell.png"
          status: pass
        - cmd: "git diff --check"
          status: pass
      summary: "PR 1 added a contained XcodeGen iOS project with a SwiftUI containing app and custom keyboard extension shell, built it for iPhone 17 iOS 26.5 simulator, installed/launched the app, captured screenshot proof, opened PR #217, and merged it into codex/ios-keyboard-prototype."
      pull_request: "https://github.com/mean-weasel/foil/pull/217"
      merged_at: "2026-06-04T12:15:26Z"
      evidence:
        - "/tmp/foil-ios-keyboard-prototype/pr1-app-shell.png"
      residual_risk:
        - "Keyboard selection and host-app insertion are not yet proven."
        - "Physical preview-iPhone proof remains blocked because iPhone-preview is offline."

  - id: T004
