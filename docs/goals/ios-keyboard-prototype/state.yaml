version: 2

goal:
  title: "Foil iOS Keyboard Prototype Overnight Queue"
  slug: "ios-keyboard-prototype"
  kind: existing_plan
  tranche: "Complete the first overnight feasibility tranche for an iOS containing app plus custom keyboard prototype, including simulator and preview-iPhone evidence."
  status: active
  oracle:
    signal: "A prototype branch with merged phase PRs proves or falsifies the keyboard handoff, physical-iPhone microphone recording, transcription, and cross-app insertion path."
    cadence: "after each Worker package and at final audit"
    final_proof: "Issue/branch/PR links plus receipts containing simulator logs or screenshots, preview-iPhone logs or recordings, transcription proof with redacted secrets, insertion matrix, and final audit verdict."
  intake:
    original_request: "Work overnight doing real tests against both the simulator and preview iPhone; queue GoalBuddy boards; use the machine's Groq/Grok API key; create a branch; create, fix up, and merge PRs into that branch."
    interpreted_outcome: "Determine whether a basic Foil iOS custom-keyboard dictation prototype can work and leave the code and proof on a dedicated branch."
    input_shape: existing_plan
    audience: "Foil owner/developer"
    authority: approved
    proof_type: demo
    completion_proof: "The prototype branch builds and has receipt-backed simulator, preview-iPhone, transcription, and insertion evidence, or explicit blocker evidence for any impossible slice."
    likely_misfire: "Landing an iOS shell without proving the iOS-specific constraints that make this app risky."
    blind_spots_considered:
      - "Keyboard extensions cannot directly own arbitrary microphone capture."
      - "The containing app may lose recording/background time after the user swipes back."
      - "Keyboard extensions may be unloaded or lose App Group state."
      - "Some apps and field types reject custom keyboards."
      - "Simulator behavior can hide physical-device microphone/background issues."
      - "API keys must be discovered and used without committing secrets."
      - "PRs must target the prototype branch, not main."
    existing_plan_facts:
      - "Use a new branch named codex/ios-keyboard-prototype."
      - "Create a queue of GoalBuddy phases for the overnight work."
      - "Run real tests on simulator and the preview iPhone."
      - "Use the locally available Groq/Grok API key for testing."
      - "Create, fix up, and merge PRs into the prototype branch."
      - "Use evidence from issue #216 and the Whisperflow recording as prior context."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/ios-keyboard-prototype/"
    command: "npx goalbuddy board docs/goals/ios-keyboard-prototype"

active_task: T005

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map the repo, Xcode/project shape, available iOS tooling, preview-iPhone availability, API-key environment, and prior issue evidence before implementation."
    inputs:
      - "README.md"
      - "Foil.xcodeproj or discovered Xcode/SwiftPM project files"
      - "docs/acceptance-evidence.md"
      - "GitHub issue #216"
      - "/Users/neonwatty/Desktop/ScreenRecording_06-03-2026 16-46-19_1.mov"
      - "Local environment variables and shell config names only; never print secret values."
      - "xcrun simctl and xcodebuild discovery output"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Do not print or persist API key values."
      - "Preserve unrelated worktree changes."
    expected_output:
      - "Repo and iOS target strategy."
      - "Simulator availability and candidate device."
      - "Preview-iPhone availability or blocker."
      - "Secret-safe API key discovery result."
      - "Risk-ranked implementation phases."
      - "Candidate PR plan targeting codex/ios-keyboard-prototype."
    receipt:
      result: done
      task_id: T001
      board_path: "docs/goals/ios-keyboard-prototype/state.yaml"
      summary: "Scout pass found a macOS-only Foil Xcode project today, current Xcode/iOS simulator tooling, a bootable iPhone 17 simulator, one connected physical iPhone-prod, the requested iPhone-preview offline, GitHub auth with repo scope, issue #216 evidence intact, and a production Foil Groq key present in Keychain without exposing the value."
      evidence:
        - "xcodebuild -list -json -project Foil.xcodeproj: schemes Foil, FoilDev, FoilE2E; no iOS target."
        - "xcodebuild -version: Xcode 26.5 build 17F42."
        - "xcrun simctl list devices available -j: iOS 26.5 iPhone 17 simulator available; iOS 26.4 iPhone 17 currently booted during scout."
        - "xcrun xctrace list devices: iPhone-prod connected; iPhone-preview offline."
        - "security find-generic-password -a groq-api-key -s com.neonwatty.Foil: item exists; value not read or printed."
        - "gh issue view 216: issue exists with enhancement label, 5 inline screenshot links, open questions, and proof plan."
        - "ffprobe ScreenRecording_06-03-2026 16-46-19_1.mov: 23.138333s, 444x960, H.264/AAC."
        - "curl http://127.0.0.1:41737/api/boards: ios-keyboard-prototype board registered."
      facts:
        - "Implementation should start by adding iOS app and keyboard-extension targets to the existing Xcode project or by generating a contained prototype project under a clearly named iOS directory."
        - "The first simulator target can be iPhone 17 on iOS 26.5 or the currently booted iPhone 17 on iOS 26.4."
        - "Physical preview-iPhone proof is blocked until iPhone-preview is online; iPhone-prod is available as a possible physical fallback if acceptable for prototype testing."
        - "The API-key bridge must read from Keychain or require a local environment variable at test time; no key should be committed or logged."
        - "Issue #216 is the canonical GitHub artifact to update with overnight evidence."
      contradictions:
        - "The user requested preview iPhone tests, but xctrace currently reports iPhone-preview offline."
        - "The user mentioned a Grok/Groq key from the machine; no GROQ/GROK environment variable is present, but a Foil production Groq Keychain item exists."
      ambiguity_requiring_judge:
        - "Whether to use connected iPhone-prod as a physical-device fallback while iPhone-preview is offline."
        - "Whether PR 1 should mutate the existing Foil.xcodeproj directly or create a contained sibling iOS prototype project under a new directory."
      commands:
        - cmd: "find . -maxdepth 3 \\( -name '*.xcodeproj' -o -name '*.xcworkspace' -o -name Package.swift -o -name '*.swiftpm' \\) -print"
          status: pass
        - cmd: "xcodebuild -list -json -project Foil.xcodeproj"
          status: pass
        - cmd: "xcodebuild -version"
          status: pass
        - cmd: "xcrun simctl list devices available -j"
          status: pass
        - cmd: "xcrun xctrace list devices"
          status: pass_with_blocker
        - cmd: "security find-generic-password -a groq-api-key -s com.neonwatty.Foil"
          status: pass_redacted
        - cmd: "gh issue view 216 --repo mean-weasel/foil --json number,title,url,labels,body"
          status: pass
      note_needed: false

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Review T001 and choose the exact first implementation slice for an iOS app plus keyboard extension shell."
    inputs:
