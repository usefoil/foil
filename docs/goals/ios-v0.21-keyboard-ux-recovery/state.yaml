          status: pass
          evidence: "17 selected tests, 0 failures"
        - cmd: "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.8/skills/goalbuddy/scripts/check-goal-state.mjs docs/goals/ios-v0.21-keyboard-ux-recovery/state.yaml"
          status: pass
          evidence: "Passed before adding the T003 receipt; rerun required after receipt normalization."
