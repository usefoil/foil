version: 2

goal:
  title: "Queued Paste Compatibility Smoke"
  slug: "queued-paste-compatibility-smoke"
  kind: specific
  tranche: "Validate queued paste against real target apps before adding hotkey or concurrency work."
  status: active
  oracle:
    signal: "TextEdit and at least one browser text-entry queued-paste smoke are executed or automated, target app/window identity behavior is recorded, fallback behavior is documented, and a compatibility matrix/runbook is added or updated."
    cadence: "after Scout findings, after smoke execution, and at final audit"
    final_proof: "Final Judge or PM audit maps smoke receipts, matrix artifact, and follow-up decisions back to the tranche oracle with full_outcome_complete: true."
  intake:
    original_request: "Continue and make a GoalBuddy plan for the next steps."
    interpreted_outcome: "Plan the next issue 159 tranche: queued-paste compatibility smoke coverage for real paste targets before hotkey or overlapping-transcription work."
    input_shape: specific
    audience: "Foil users relying on queued paste to return text to the original app/window."
    authority: approved
    proof_type: demo
    completion_proof: "A committed compatibility matrix/runbook plus smoke receipts demonstrate queued paste behavior in TextEdit and a browser target."
    likely_misfire: "Adding more architecture or tests while skipping real target compatibility evidence."
    blind_spots_considered:
      - "Queued paste stores app/window target identity, not only click location, but app compatibility still needs realistic smoke evidence."
      - "Accessibility and paste behavior can differ between TextEdit, browsers, and unavailable target windows."
      - "Global hotkey and overlapping transcription work are intentionally out of scope until compatibility is understood."
    existing_plan_facts:
      - "PR1 queued-paste MVP is merged as PR #160."
      - "PR2 recommendation is compatibility smoke matrix."
      - "Later PRs may cover global delivery hotkey and overlapping recording/transcription architecture."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

