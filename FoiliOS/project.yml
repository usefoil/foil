name: FoilIOS
options:
  bundleIdPrefix: com.neonwatty
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: B3A6AN2HA4
    MARKETING_VERSION: 0.1.0
    SWIFT_VERSION: 5.0
    TARGETED_DEVICE_FAMILY: 1
targets:
  FoilIOS:
    type: application
    platform: iOS
    sources:
      - path: FoilIOSApp
      - path: Shared
    dependencies:
      - target: FoilKeyboard
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.neonwatty.FoilIOS
        PRODUCT_NAME: Foil iOS
    entitlements:
      path: FoilIOSApp/Generated/FoilIOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.neonwatty.FoilIOS
    info:
      path: FoilIOSApp/Generated/Info.plist
      properties:
        CFBundleDisplayName: Foil iOS
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleURLTypes:
          - CFBundleURLName: com.neonwatty.FoilIOS
            CFBundleURLSchemes:
              - foilios
        LSRequiresIPhoneOS: true
        UIRequiresFullScreen: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: Foil uses the microphone to capture dictation before sending text back to the keyboard.
  FoilKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: FoilKeyboard
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.neonwatty.FoilIOS.Keyboard
        PRODUCT_NAME: Foil Keyboard
        SKIP_INSTALL: YES
    entitlements:
      path: FoilKeyboard/Generated/FoilKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.neonwatty.FoilIOS
    info:
      path: FoilKeyboard/Generated/Info.plist
      properties:
        CFBundleDisplayName: Foil Keyboard
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: true
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
