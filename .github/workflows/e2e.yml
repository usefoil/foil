name: E2E Groq API Tests

on:
  merge_group:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6am UTC

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app_ci: ${{ steps.detect.outputs.app_ci }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect app-impacting changes
        id: detect
        run: bash .github/scripts/app-ci-required.sh

  e2e-tests:
    name: Live Groq API Tests
    runs-on: macos-15
    timeout-minutes: 10
    needs: [detect-changes]
    # Don't run on forks (no access to secrets)
    if: github.repository == 'usefoil/foil' && needs.detect-changes.outputs.app_ci == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Run live Groq E2E tests
        env:
          RUN_LIVE_GROQ_TESTS: "1"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "::warning::GROQ_API_KEY secret not set — skipping E2E tests"
            exit 0
          fi

          # Set env vars in the user session so the test host process inherits them
          launchctl setenv RUN_LIVE_GROQ_TESTS 1
          launchctl setenv GROQ_API_KEY "$GROQ_API_KEY"

          make test-live-groq

      - name: Run E2E transcription UI test
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "::warning::GROQ_API_KEY secret not set — skipping E2E UI test"
            exit 0
          fi

          # Ensure API key is in the keychain for the test host
          security add-generic-password \
            -s "com.neonwatty.Foil" \
            -a "groq-api-key" \
            -w "$GROQ_API_KEY" -U 2>/dev/null || true

          xcodebuild test \
            -scheme Foil \
            -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:FoilUITests/FoilUITests/testE2ETranscription \
            | xcpretty --color && exit ${PIPESTATUS[0]}
