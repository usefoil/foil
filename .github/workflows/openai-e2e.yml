name: E2E OpenAI API Tests

on:
  merge_group:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * 1'  # Weekly on Monday at 6:30am UTC

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app_ci: ${{ steps.detect.outputs.app_ci }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect app-impacting changes
        id: detect
        run: bash .github/scripts/app-ci-required.sh

  e2e-tests:
    name: Live OpenAI API Tests
    runs-on: macos-15
    timeout-minutes: 15
    needs: [detect-changes]
    # Don't run on forks (no access to secrets)
    if: github.repository == 'usefoil/foil' && needs.detect-changes.outputs.app_ci == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Run live OpenAI CLI E2E
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          E2E_TRANSCRIPTION_TIMEOUT_SECONDS: "90"
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::warning::OPENAI_API_KEY secret not set — skipping OpenAI E2E tests"
            exit 0
          fi

          make test-live-openai

      - name: Run live OpenAI app E2E
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          E2E_TRANSCRIPTION_TIMEOUT_SECONDS: "90"
          E2E_CLEANUP_PROVIDER: openai
          E2E_CLEANUP_MODE: numbered
          E2E_CLEANUP_MODEL: gpt-5.4-mini
          E2E_CLEANUP_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::warning::OPENAI_API_KEY secret not set — skipping OpenAI app E2E test"
            exit 0
          fi

          make test-live-openai-provider-qa
