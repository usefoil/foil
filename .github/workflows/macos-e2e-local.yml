name: Local macOS E2E

on:
  merge_group:
    branches: [main]
  push:
    branches:
      - main
      - "gh-readonly-queue/main/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    name: Live Groq transcription on local Mac
    runs-on: [self-hosted, macOS, ARM64, trusted-macos-e2e, e2e, gui, browser]
    timeout-minutes: 45
    steps:
      - name: Host proof
        run: |
          hostname
          sw_vers
          uname -m
          xcodebuild -version

      - name: Workspace cleanup before
        working-directory: /
        run: |
          set -euo pipefail

          case "${GITHUB_WORKSPACE:-}" in
            "$HOME/actions-runner/_work/"*)
              rm -rf "$GITHUB_WORKSPACE"
              mkdir -p "$GITHUB_WORKSPACE"
              ;;
            *)
              echo "Refusing to clean unexpected GITHUB_WORKSPACE: ${GITHUB_WORKSPACE:-<unset>}" >&2
              exit 1
              ;;
          esac

      - name: Healthcheck before
        working-directory: /
        run: |
          RUNNER_HOME="$HOME" \
          RUNNER_WORK="$HOME/actions-runner/_work" \
          /usr/local/ci/bin/macos-runner-healthcheck --json

      - uses: actions/checkout@v6

      - name: Verify live E2E secret
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "${GROQ_API_KEY:-}" ]; then
            echo "::error::GROQ_API_KEY is required for local macOS E2E."
            exit 1
          fi

      - name: Stop stale GroqTalk processes
        run: |
          pkill -x GroqTalk || true
          pkill -f 'xcodebuild.*GroqTalk' || true

      - name: Run live transcription app E2E
        timeout-minutes: 35
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RUN_LIVE_GROQ_TESTS: "1"
          E2E_TRANSCRIPTION_TIMEOUT_SECONDS: "90"
        run: |
          set -euo pipefail

          if [ -z "${GROQ_API_KEY:-}" ]; then
            echo "::error::GROQ_API_KEY is required for local macOS UI E2E."
            exit 1
          fi

          RESULT_PATH="/tmp/groqtalk-e2e-result.txt"
          DERIVED_DATA="$PWD/LocalE2EDerivedData"
          APP_PATH="$DERIVED_DATA/Build/Products/Debug/GroqTalk.app"
          APP_BIN="$APP_PATH/Contents/MacOS/GroqTalk"

          rm -rf "$DERIVED_DATA" LocalAppE2E.log "$RESULT_PATH"

          xcodebuild build \
            -scheme GroqTalk \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath "$DERIVED_DATA"

          security add-generic-password \
            -s "com.neonwatty.GroqTalk" \
            -a "groq-api-key" \
            -w "$GROQ_API_KEY" -U 2>/dev/null || true

          RUN_LIVE_GROQ_TESTS="$RUN_LIVE_GROQ_TESTS" \
          GROQ_API_KEY="$GROQ_API_KEY" \
          E2E_API_KEY="$GROQ_API_KEY" \
          E2E_TRANSCRIPTION_TIMEOUT_SECONDS="$E2E_TRANSCRIPTION_TIMEOUT_SECONDS" \
            "$APP_BIN" --ui-testing --reset-defaults --e2e-transcribe >LocalAppE2E.log 2>&1 &
          APP_PID=$!

          caffeinate -dimsu -w "$APP_PID" &
          CAFFEINATE_PID=$!

          deadline=$((SECONDS + E2E_TRANSCRIPTION_TIMEOUT_SECONDS))
          transcript=""
          while [ "$SECONDS" -lt "$deadline" ]; do
            if [ -s "$RESULT_PATH" ]; then
              transcript="$(cat "$RESULT_PATH")"
              break
            fi
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "::error::GroqTalk exited before writing E2E result."
              tail -120 LocalAppE2E.log || true
              exit 1
            fi
            sleep 1
          done

          kill "$CAFFEINATE_PID" 2>/dev/null || true
          kill "$APP_PID" 2>/dev/null || true
          wait "$CAFFEINATE_PID" 2>/dev/null || true

          if [ -z "$transcript" ]; then
            echo "::error::E2E transcription did not write $RESULT_PATH within ${E2E_TRANSCRIPTION_TIMEOUT_SECONDS}s."
            tail -120 LocalAppE2E.log || true
            exit 1
          fi

          normalized="$(printf '%s' "$transcript" | tr '[:upper:]' '[:lower:]' | tr -cd '[:alpha:][:space:]')"
          missing=0
          for word in the quick brown fox jumps over lazy dog; do
            if ! printf '%s\n' "$normalized" | grep -qw "$word"; then
              missing=$((missing + 1))
            fi
          done

          if [ "$missing" -gt 1 ]; then
            echo "::error::Transcript missing too many expected words. Transcript: $transcript"
            exit 1
          fi

          echo "E2E transcript: $transcript"

      - name: Upload local UI test results
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: local-app-e2e-artifacts
          path: |
            /tmp/groqtalk-e2e-result.txt
            LocalAppE2E.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Healthcheck after
        if: always()
        working-directory: /
        run: |
          RUNNER_HOME="$HOME" \
          RUNNER_WORK="$HOME/actions-runner/_work" \
          /usr/local/ci/bin/macos-runner-healthcheck --json
