name: Local macOS E2E

on:
  merge_group:
    branches: [main]
  push:
    branches:
      - main
      - "gh-readonly-queue/main/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    name: Live Groq transcription on local Mac
    runs-on: [self-hosted, macOS, ARM64, trusted-macos-e2e, e2e, gui, browser]
    timeout-minutes: 45
    steps:
      - name: Host proof
        run: |
          hostname
          sw_vers
          uname -m
          xcodebuild -version

      - name: Workspace cleanup before
        working-directory: /
        run: |
          set -euo pipefail

          case "${GITHUB_WORKSPACE:-}" in
            "$HOME/actions-runner/_work/"*)
              rm -rf "$GITHUB_WORKSPACE"
              mkdir -p "$GITHUB_WORKSPACE"
              ;;
            *)
              echo "Refusing to clean unexpected GITHUB_WORKSPACE: ${GITHUB_WORKSPACE:-<unset>}" >&2
              exit 1
              ;;
          esac

      - name: Healthcheck before
        working-directory: /
        run: |
          RUNNER_HOME="$HOME" \
          RUNNER_WORK="$HOME/actions-runner/_work" \
          /usr/local/ci/bin/macos-runner-healthcheck --json

      - uses: actions/checkout@v6

      - name: Verify live E2E secret
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "${GROQ_API_KEY:-}" ]; then
            echo "::error::GROQ_API_KEY is required for local macOS E2E."
            exit 1
          fi

      - name: Stop stale GroqTalk processes
        run: |
          pkill -x GroqTalk || true
          pkill -f 'xcodebuild.*GroqTalk' || true

      - name: Run live Groq API integration tests
        timeout-minutes: 12
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RUN_LIVE_GROQ_TESTS: "1"
        run: |
          set -euo pipefail

          xcodebuild test \
            -scheme GroqTalk \
            -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:GroqTalkTests/IntegrationTests &
          XCODE_PID=$!

          caffeinate -dimsu -w "$XCODE_PID" &
          CAFFEINATE_PID=$!

          (
            sleep 300 && kill -TERM "$XCODE_PID" 2>/dev/null
            sleep 60 && kill -9 "$XCODE_PID" 2>/dev/null
          ) &
          WATCHDOG_PID=$!

          set +e
          wait "$XCODE_PID"
          TEST_EXIT=$?
          kill "$WATCHDOG_PID" "$CAFFEINATE_PID" 2>/dev/null
          wait "$WATCHDOG_PID" "$CAFFEINATE_PID" 2>/dev/null
          set -e

          exit "$TEST_EXIT"

      - name: Run live transcription UI E2E
        timeout-minutes: 20
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RUN_LIVE_GROQ_TESTS: "1"
          E2E_TRANSCRIPTION_TIMEOUT_SECONDS: "90"
        run: |
          if [ -z "${GROQ_API_KEY:-}" ]; then
            echo "::error::GROQ_API_KEY is required for local macOS UI E2E."
            exit 1
          fi

          # Match the hosted E2E workflow's proven environment/keychain path.
          launchctl setenv RUN_LIVE_GROQ_TESTS 1
          launchctl setenv GROQ_API_KEY "$GROQ_API_KEY"
          launchctl setenv E2E_TRANSCRIPTION_TIMEOUT_SECONDS "$E2E_TRANSCRIPTION_TIMEOUT_SECONDS"
          security add-generic-password \
            -s "com.neonwatty.GroqTalk" \
            -a "groq-api-key" \
            -w "$GROQ_API_KEY" -U 2>/dev/null || true

          rm -rf LocalUITestResults.xcresult

          xcodebuild test \
            -scheme GroqTalk \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -parallel-testing-enabled NO \
            -maximum-concurrent-test-device-destinations 1 \
            -enableCodeCoverage NO \
            -only-testing:GroqTalkUITests/GroqTalkUITests/testE2ETranscription \
            -resultBundlePath LocalUITestResults.xcresult &
          XCODE_PID=$!

          caffeinate -dimsu -w "$XCODE_PID" &
          CAFFEINATE_PID=$!

          (
            sleep 600 && kill -TERM "$XCODE_PID" 2>/dev/null
            sleep 60 && kill -9 "$XCODE_PID" 2>/dev/null
          ) &
          WATCHDOG_PID=$!

          set +e
          wait "$XCODE_PID"
          TEST_EXIT=$?
          kill "$WATCHDOG_PID" "$CAFFEINATE_PID" 2>/dev/null
          wait "$WATCHDOG_PID" "$CAFFEINATE_PID" 2>/dev/null
          set -e

          if [ -d LocalUITestResults.xcresult ]; then
            xcrun xcresulttool get test-results summary \
              --path LocalUITestResults.xcresult \
              --compact 2>/dev/null || true
          fi

          exit "$TEST_EXIT"

      - name: Upload local UI test results
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: local-ui-test-results
          path: LocalUITestResults.xcresult
          retention-days: 14
          if-no-files-found: ignore

      - name: Healthcheck after
        if: always()
        working-directory: /
        run: |
          RUNNER_HOME="$HOME" \
          RUNNER_WORK="$HOME/actions-runner/_work" \
          /usr/local/ci/bin/macos-runner-healthcheck --json
