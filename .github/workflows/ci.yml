name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  merge_group:

concurrency:
  group: ci-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.detect.outputs.app_ci }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect app-impacting changes
        id: detect
        run: bash .github/scripts/app-ci-required.sh

  build:
    name: Build
    runs-on: macos-15
    timeout-minutes: 15
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      needs.detect-changes.outputs.code == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Run release script tests
        run: scripts/test-build-notarized-qa-dmg.sh

      - name: Build (warnings as errors)
        run: |
          xcodebuild build \
            -scheme Foil \
            -configuration Debug \
            -destination 'platform=macOS' \
            OTHER_SWIFT_FLAGS='-warnings-as-errors' \
            | xcpretty --color && exit ${PIPESTATUS[0]}

  unit-tests:
    name: Unit Tests
    runs-on: macos-15
    timeout-minutes: 15
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      needs.detect-changes.outputs.code == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Run tests
        id: run-tests
        env:
          RUN_LIVE_GROQ_TESTS: "0"
        run: |
          # Run xcodebuild in background so we can send SIGTERM (graceful) on timeout
          # instead of relying on step timeout's SIGKILL (which corrupts xcresult)
          xcodebuild test \
            -scheme Foil \
            -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:FoilTests \
            -skip-testing:FoilTests/LiveGroqIntegrationTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult &
          XCODE_PID=$!

          # Watchdog: SIGTERM after 7 min (graceful), SIGKILL after 8 min (forced)
          ( sleep 420 && kill -TERM $XCODE_PID 2>/dev/null
            sleep 60  && kill -9    $XCODE_PID 2>/dev/null ) &
          WATCHDOG_PID=$!

          # Wait for xcodebuild to exit (naturally or via watchdog)
          # Disable errexit so non-zero wait (from SIGTERM) doesn't abort before verification
          set +e
          wait $XCODE_PID 2>/dev/null
          TEST_EXIT=$?
          kill $WATCHDOG_PID 2>/dev/null
          wait $WATCHDOG_PID 2>/dev/null
          set -e

          # Check xcresult for actual test failures
          if [ -d TestResults.xcresult ]; then
            SUMMARY=$(xcrun xcresulttool get test-results summary \
              --path TestResults.xcresult --compact 2>/dev/null || echo "")
            if echo "$SUMMARY" | grep -q '"result" : "Failed"'; then
              echo "::error::Test failures found in results bundle"
              echo "$SUMMARY" | head -50
              exit 1
            fi
            echo "All tests passed per results bundle"
            exit 0
          fi

          # No bundle — use raw exit code
          exit $TEST_EXIT

      - name: Test summary
        if: always()
        run: |
          append_capped_summary() {
            local source_file="$1"
            local limit_bytes=900000
            local byte_count

            byte_count=$(wc -c < "$source_file" | tr -d ' ')
            if [ "$byte_count" -gt "$limit_bytes" ]; then
              head -c "$limit_bytes" "$source_file" >> "$GITHUB_STEP_SUMMARY"
              {
                echo
                echo
                echo "_Test summary truncated to ${limit_bytes} bytes from ${byte_count} bytes to stay under GitHub's step-summary limit._"
              } >> "$GITHUB_STEP_SUMMARY"
            else
              cat "$source_file" >> "$GITHUB_STEP_SUMMARY"
            fi
          }

          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          if [ -d TestResults.xcresult ]; then
            SUMMARY_FILE="$(mktemp)"
            if xcrun xcresulttool get test-results summary \
              --path TestResults.xcresult \
              --compact > "$SUMMARY_FILE" 2>/dev/null; then
              append_capped_summary "$SUMMARY_FILE"
            else
              echo "_Could not parse test results._" >> "$GITHUB_STEP_SUMMARY"
            fi
            rm -f "$SUMMARY_FILE"
          else
            echo "_No test results bundle found._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test results
        if: failure() || cancelled()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 14

      - name: Generate coverage report
        if: always()
        run: |
          append_capped_summary() {
            local source_file="$1"
            local limit_bytes=900000
            local byte_count

            byte_count=$(wc -c < "$source_file" | tr -d ' ')
            if [ "$byte_count" -gt "$limit_bytes" ]; then
              head -c "$limit_bytes" "$source_file" >> "$GITHUB_STEP_SUMMARY"
              {
                echo
                echo
                echo "_Coverage report truncated to ${limit_bytes} bytes from ${byte_count} bytes to stay under GitHub's step-summary limit._"
              } >> "$GITHUB_STEP_SUMMARY"
            else
              cat "$source_file" >> "$GITHUB_STEP_SUMMARY"
            fi
          }

          if [ -d TestResults.xcresult ]; then
            xcrun xccov view --report --json TestResults.xcresult > coverage.json 2>/dev/null || true
            echo "## Code Coverage" >> "$GITHUB_STEP_SUMMARY"
            COVERAGE_SUMMARY_FILE="$(mktemp)"
            if xcrun xccov view --report TestResults.xcresult > "$COVERAGE_SUMMARY_FILE" 2>/dev/null; then
              append_capped_summary "$COVERAGE_SUMMARY_FILE"
            else
              echo "_Could not parse coverage report (bundle may be incomplete)._" >> "$GITHUB_STEP_SUMMARY"
            fi
            rm -f "$COVERAGE_SUMMARY_FILE"
          else
            echo "_No test results bundle found; skipping coverage report._"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.json
          retention-days: 30
          if-no-files-found: ignore

  audio-ux-snapshots:
    name: Audio UX Snapshots
    runs-on: macos-15
    timeout-minutes: 15
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      needs.detect-changes.outputs.code == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Render audio UX snapshots
        env:
          SNAPSHOT_OUTPUT_DIR: audio-ux-snapshots
        run: make render-audio-ux-snapshots

      - name: Snapshot summary
        if: always()
        run: |
          echo "## Audio UX Snapshots" >> "$GITHUB_STEP_SUMMARY"
          if [ -f audio-ux-snapshots/receipt.json ]; then
            echo "\`\`\`json" >> "$GITHUB_STEP_SUMMARY"
            cat audio-ux-snapshots/receipt.json >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No snapshot receipt generated._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload audio UX snapshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: audio-ux-snapshots
          path: audio-ux-snapshots
          retention-days: 14
          if-no-files-found: error

  ui-tests:
    name: Focused UI Smoke
    runs-on: macos-15
    timeout-minutes: 15
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      needs.detect-changes.outputs.code == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Run focused UI smoke
        env:
          ACTIVE_MODE_SCREENSHOT_DIR: /tmp/foil-active-mode-screenshots
          HISTORY_TRANSFORM_SCREENSHOT_DIR: /tmp/foil-history-transform-screenshots
        run: |
          xcodebuild test \
            -scheme Foil \
            -configuration Debug \
            -destination 'platform=macOS' \
            -parallel-testing-enabled NO \
            -maximum-concurrent-test-device-destinations 1 \
            -enableCodeCoverage NO \
            -only-testing:FoilUITests/FoilUITests/testControlCenterShowsSeededReadyState \
            -only-testing:FoilUITests/FoilUITests/testSetupCheckCanBeRunInline \
            -only-testing:FoilUITests/FoilUITests/testMicrophoneUnknownShowsCheckAction \
            -only-testing:FoilUITests/FoilUITests/testMicrophoneDeniedShowsOpenSettingsAction \
            -only-testing:FoilUITests/FoilUITests/testSettingsButtonOpensSettingsWindow \
            -only-testing:FoilUITests/FoilUITests/testProviderQADefaultsToGroqPreset \
            -only-testing:FoilUITests/FoilUITests/testProviderQAOpenAIWhisperPresetShowsCloudSettings \
            -only-testing:FoilUITests/FoilUITests/testProviderQALocalWhisperPresetShowsExpectedSettings \
            -only-testing:FoilUITests/FoilUITests/testProviderQALocalWhisperSetupHelperShowsModelCommands \
            -only-testing:FoilUITests/FoilUITests/testSimulatedRecordingUsesCurrentAppPasteWhenAsyncIsOff \
            -only-testing:FoilUITests/FoilUITests/testSimulatedRecordingUsesAsyncPasteWhenEnabled \
            -only-testing:FoilUITests/FoilUITests/testSimulatedRecordingFailureKeepsRetryVisibleInHistory \
            -only-testing:FoilUITests/FoilUITests/testActiveCleanupModeSelectorPersistsAndScreenshotsResult \
            -only-testing:FoilUITests/FoilUITests/testAppShellHistoryBulletizeTransformPreservesBulletFormatInDetail \
            -only-testing:FoilUITests/FoilUITests/testFloatingWarningShowsExpandedClipboardContext \
            -only-testing:FoilUITests/FoilUITests/testFloatingStatusAutoHidesAfterSuccessWhenEnabled \
            -only-testing:FoilUITests/FoilUITests/testFloatingStatusIsDisabledByDefault \
            -only-testing:FoilUITests/FoilUITests/testMovedPreferencesLiveInSettingsPanes \
            -only-testing:FoilUITests/FoilUITests/testCustomHotkeyRecorderIsAccessibleButton \
            -only-testing:FoilUITests/FoilUITests/testSelectedStartCueIsUsedBeforeRecorderStarts \
            -only-testing:FoilUITests/FoilUITests/testHelpButtonTargetsCanonicalTroubleshootingURL \
            -resultBundlePath UITestResults.xcresult \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      - name: UI test summary
        if: always()
        run: |
          append_capped_summary() {
            local source_file="$1"
            local limit_bytes=900000
            local byte_count

            byte_count=$(wc -c < "$source_file" | tr -d ' ')
            if [ "$byte_count" -gt "$limit_bytes" ]; then
              head -c "$limit_bytes" "$source_file" >> "$GITHUB_STEP_SUMMARY"
              {
                echo
                echo
                echo "_UI test summary truncated to ${limit_bytes} bytes from ${byte_count} bytes to stay under GitHub's step-summary limit._"
              } >> "$GITHUB_STEP_SUMMARY"
            else
              cat "$source_file" >> "$GITHUB_STEP_SUMMARY"
            fi
          }

          echo "## UI Test Results" >> "$GITHUB_STEP_SUMMARY"
          if [ -d UITestResults.xcresult ]; then
            UI_SUMMARY_FILE="$(mktemp)"
            if xcrun xcresulttool get test-results summary \
              --path UITestResults.xcresult \
              --compact > "$UI_SUMMARY_FILE" 2>/dev/null; then
              append_capped_summary "$UI_SUMMARY_FILE"
            else
              echo "_Could not parse UI test results._" >> "$GITHUB_STEP_SUMMARY"
            fi
            rm -f "$UI_SUMMARY_FILE"
          else
            echo "_No UI test results bundle found._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-test-results
          path: UITestResults.xcresult
          retention-days: 14

  ci-gate:
    name: CI Gate
    runs-on: macos-latest
    timeout-minutes: 5
    if: always()
    needs:
      - detect-changes
      - build
      - unit-tests
      - ui-tests
    steps:
      - name: Check required jobs
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          TEST_RESULT: ${{ needs.unit-tests.result }}
          UI_TEST_RESULT: ${{ needs.ui-tests.result }}
          CODE_CHANGED: ${{ needs.detect-changes.outputs.code }}
        run: |
          echo "Build: $BUILD_RESULT, Tests: $TEST_RESULT, UI Tests: $UI_TEST_RESULT, Code changed: $CODE_CHANGED"
          for result in "$BUILD_RESULT" "$TEST_RESULT" "$UI_TEST_RESULT"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "A required job reported: $result"
              exit 1
            fi
            if [ "$CODE_CHANGED" = "true" ] && [ "$result" = "skipped" ]; then
              echo "A required job was skipped for a code or release-critical change"
              exit 1
            fi
          done
          echo "All required jobs passed, or were intentionally skipped for non-code changes"
