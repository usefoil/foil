name: CI

on:
  pull_request:
    branches: [main, feat/initial-implementation]
    types: [opened, synchronize, reopened]
  merge_group:

concurrency:
  group: ci-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: macos-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'GroqTalk/**'
              - 'GroqTalkTests/**'
              - 'GroqTalkUITests/**'
              - 'GroqTalk.xcodeproj/**'
              - 'project.yml'
              - '.github/**'
              - '.releaserc.json'
              - 'ExportOptions.plist'
              - 'Makefile'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/**'
              - 'docs/release-*.md'

  build:
    name: Build
    runs-on: macos-15
    timeout-minutes: 15
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      (github.event_name != 'pull_request' ||
       needs.detect-changes.outputs.code == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Build (warnings as errors)
        run: |
          xcodebuild build \
            -scheme GroqTalk \
            -configuration Debug \
            -destination 'platform=macOS' \
            OTHER_SWIFT_FLAGS='-warnings-as-errors' \
            | xcpretty --color && exit ${PIPESTATUS[0]}

  unit-tests:
    name: Unit Tests
    runs-on: macos-15
    timeout-minutes: 15
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      (github.event_name != 'pull_request' ||
       needs.detect-changes.outputs.code == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme GroqTalk \
            -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:GroqTalkTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          if [ -d TestResults.xcresult ]; then
            xcrun xcresulttool get test-results summary \
              --path TestResults.xcresult \
              --compact 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || \
            echo "_Could not parse test results._" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No test results bundle found._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 14

      - name: Generate coverage report
        if: always()
        run: |
          if [ -d TestResults.xcresult ]; then
            xcrun xccov view --report --json TestResults.xcresult > coverage.json
            echo "## Code Coverage" >> "$GITHUB_STEP_SUMMARY"
            xcrun xccov view --report TestResults.xcresult 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || \
              echo "_Could not parse coverage report._" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No test results bundle found; skipping coverage report._"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage.json
          retention-days: 30
          if-no-files-found: ignore

  ui-tests:
    name: UI Tests
    runs-on: macos-15
    timeout-minutes: 15
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      (github.event_name != 'pull_request' ||
       needs.detect-changes.outputs.code == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Run UI tests
        run: |
          xcodebuild test \
            -scheme GroqTalk \
            -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:GroqTalkUITests \
            -resultBundlePath UITestResults.xcresult \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      - name: UI test summary
        if: always()
        run: |
          echo "## UI Test Results" >> "$GITHUB_STEP_SUMMARY"
          if [ -d UITestResults.xcresult ]; then
            xcrun xcresulttool get test-results summary \
              --path UITestResults.xcresult \
              --compact 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || \
            echo "_Could not parse UI test results._" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No UI test results bundle found._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload UI test results
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: ui-test-results
          path: UITestResults.xcresult
          retention-days: 14

  ci-gate:
    name: CI Gate
    runs-on: macos-latest
    timeout-minutes: 5
    if: always()
    needs:
      - detect-changes
      - build
      - unit-tests
      - ui-tests
    steps:
      - name: Check required jobs
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          TEST_RESULT: ${{ needs.unit-tests.result }}
          UI_TEST_RESULT: ${{ needs.ui-tests.result }}
          CODE_CHANGED: ${{ needs.detect-changes.outputs.code }}
        run: |
          echo "Build: $BUILD_RESULT, Tests: $TEST_RESULT, UI Tests: $UI_TEST_RESULT, Code changed: $CODE_CHANGED"
          for result in "$BUILD_RESULT" "$TEST_RESULT" "$UI_TEST_RESULT"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "A required job reported: $result"
              exit 1
            fi
            if [ "$CODE_CHANGED" = "true" ] && [ "$result" = "skipped" ]; then
              echo "A required job was skipped for a code or release-critical change"
              exit 1
            fi
          done
          echo "All required jobs passed, or were intentionally skipped for non-code changes"
