name: Notarized QA Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build
        required: true
        default: main
        type: string
      version:
        description: Optional CFBundleShortVersionString override
        required: false
        type: string
      build:
        description: Optional CFBundleVersion override
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-notarized-dmg:
    name: Build Notarized QA DMG
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: .github/scripts/import-cert.sh

      - name: Build and notarize QA DMG
        id: build
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          VERSION: ${{ inputs.version }}
          BUILD_NUMBER: ${{ inputs.build }}
          QA_SUFFIX: ${{ inputs.ref }}-${{ github.run_number }}
        run: .github/scripts/build-notarized-qa-dmg.sh

      - name: Upload notarized QA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Foil-${{ steps.build.outputs.version }}-${{ steps.build.outputs.build }}-notarized-qa
          path: |
            ${{ steps.build.outputs.dmg_path }}
            ${{ steps.build.outputs.checksum_path }}
          if-no-files-found: error

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
