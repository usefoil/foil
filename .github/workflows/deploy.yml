name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: Existing release version to build, without the leading v
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run semantic release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release
          if ! grep -q '^new_release_published=true$' "$GITHUB_OUTPUT"; then
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
          fi

  build-dmg:
    name: Build DMG
    runs-on: macos-15
    timeout-minutes: 30
    needs: [release]
    if: needs.release.outputs.new_release_published == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: v${{ needs.release.outputs.new_release_version }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: .github/scripts/import-cert.sh

      - name: Build, notarize, and upload DMG
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: .github/scripts/build-release-dmg.sh

      - name: Validate notarization
        env:
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          DMG_PATH="$RUNNER_TEMP/GroqTalk-${VERSION}-macos.dmg"
          echo "Validating notarization for: $DMG_PATH"
          spctl --assess --type open --context context:primary-signature -v "$DMG_PATH"
          if [ $? -ne 0 ]; then
            echo "Notarization validation FAILED: spctl rejected the DMG" >&2
            exit 1
          fi
          echo "Notarization validation passed."

      - name: Generate and upload appcast.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          DMG_PATH="$RUNNER_TEMP/GroqTalk-${VERSION}-macos.dmg"
          DMG_FILENAME="GroqTalk-${VERSION}-macos.dmg"
          DMG_URL="https://github.com/neonwatty/groqtalk/releases/download/v${VERSION}/${DMG_FILENAME}"
          FILE_SIZE=$(stat -f%z "$DMG_PATH")
          BUILD_NUMBER="${GITHUB_RUN_NUMBER:-1}"
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          APPCAST_PATH="$RUNNER_TEMP/appcast.xml"

          cat > "$APPCAST_PATH" <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>GroqTalk</title>
              <link>https://github.com/neonwatty/groqtalk</link>
              <description>GroqTalk Updates</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:version>${BUILD_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="${DMG_URL}"
                  length="${FILE_SIZE}"
                  type="application/octet-stream"
                />
              </item>
            </channel>
          </rss>
          EOF

          echo "Generated appcast.xml:"
          cat "$APPCAST_PATH"

          gh release upload "v${VERSION}" "$APPCAST_PATH" --clobber

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

  build-dmg-manual:
    name: Build DMG for Existing Release
    runs-on: macos-15
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: v${{ inputs.version }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: .github/scripts/import-cert.sh

      - name: Build, notarize, and upload DMG
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: .github/scripts/build-release-dmg.sh

      - name: Validate notarization
        env:
          VERSION: ${{ inputs.version }}
        run: |
          DMG_PATH="$RUNNER_TEMP/GroqTalk-${VERSION}-macos.dmg"
          echo "Validating notarization for: $DMG_PATH"
          spctl --assess --type open --context context:primary-signature -v "$DMG_PATH"
          if [ $? -ne 0 ]; then
            echo "Notarization validation FAILED: spctl rejected the DMG" >&2
            exit 1
          fi
          echo "Notarization validation passed."

      - name: Generate and upload appcast.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          DMG_PATH="$RUNNER_TEMP/GroqTalk-${VERSION}-macos.dmg"
          DMG_FILENAME="GroqTalk-${VERSION}-macos.dmg"
          DMG_URL="https://github.com/neonwatty/groqtalk/releases/download/v${VERSION}/${DMG_FILENAME}"
          FILE_SIZE=$(stat -f%z "$DMG_PATH")
          BUILD_NUMBER="${GITHUB_RUN_NUMBER:-1}"
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          APPCAST_PATH="$RUNNER_TEMP/appcast.xml"

          cat > "$APPCAST_PATH" <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>GroqTalk</title>
              <link>https://github.com/neonwatty/groqtalk</link>
              <description>GroqTalk Updates</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:version>${BUILD_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="${DMG_URL}"
                  length="${FILE_SIZE}"
                  type="application/octet-stream"
                />
              </item>
            </channel>
          </rss>
          EOF

          echo "Generated appcast.xml:"
          cat "$APPCAST_PATH"

          gh release upload "v${VERSION}" "$APPCAST_PATH" --clobber

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
