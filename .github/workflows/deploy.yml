name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to build, without the leading v
        required: true
        type: string
      build:
        description: Release build number
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build DMG for Tagged Release
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Validate version input
        run: |
          if ! printf '%s' "${{ inputs.version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Version must be a semantic version without a leading v, for example 1.12.1" >&2
            exit 1
          fi
          if ! printf '%s' "${{ inputs.build }}" | grep -Eq '^[0-9]+$'; then
            echo "Build must be a positive integer, for example 33" >&2
            exit 1
          fi

      - name: Checkout tagged release
        uses: actions/checkout@v5
        with:
          ref: v${{ inputs.version }}
          fetch-depth: 0

      - name: Verify tag points at this checkout
        run: |
          tag="v${{ inputs.version }}"
          git fetch --force --tags
          tag_sha="$(git rev-list -n 1 "$tag")"
          head_sha="$(git rev-parse HEAD)"
          if [ "$tag_sha" != "$head_sha" ]; then
            echo "Checked out $head_sha, but $tag points at $tag_sha" >&2
            exit 1
          fi

      - name: Ensure GitHub release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: .github/scripts/ensure-github-release.sh

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: .github/scripts/import-cert.sh

      - name: Build, notarize, and upload DMG
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          BUILD_NUMBER: ${{ inputs.build }}
        run: .github/scripts/build-release-dmg.sh

      - name: Validate notarization
        env:
          VERSION: ${{ inputs.version }}
        run: |
          DMG_PATH="$RUNNER_TEMP/GroqTalk-${VERSION}-macos.dmg"
          echo "Validating notarization for: $DMG_PATH"
          spctl --assess --type open --context context:primary-signature -v "$DMG_PATH"
          echo "Notarization validation passed."

      - name: Generate and upload appcast.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          BUILD_NUMBER: ${{ inputs.build }}
        run: .github/scripts/generate-appcast.sh

      - name: Update Homebrew cask
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: .github/scripts/update-homebrew-cask.sh

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
