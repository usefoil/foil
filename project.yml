name: Foil
options:
  bundleIdPrefix: com.neonwatty
  deploymentTarget:
    macOS: "14.0"
  minimumXcodeGenVersion: "2.0"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
targets:
  Foil:
    type: application
    platform: macOS
    sources: [Foil]
    settings:
      base:
        ENABLE_HARDENED_RUNTIME: YES
        MARKETING_VERSION: "1.12.2"
        CURRENT_PROJECT_VERSION: 34
        PRODUCT_NAME: Foil
        PRODUCT_MODULE_NAME: Foil
        PRODUCT_BUNDLE_IDENTIFIER: com.neonwatty.Foil
        CODE_SIGN_ENTITLEMENTS: Foil/Foil.entitlements
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - package: Sparkle
    info:
      path: Foil/Info.plist
      properties:
        CFBundleDisplayName: "Foil"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        NSMicrophoneUsageDescription: "Foil needs microphone access to record audio for speech-to-text."
        NSAppleEventsUsageDescription: "Foil uses Apple Events to pause browser media in Chrome and Chromium while recording, when you enable this experimental setting."
        SUFeedURL: "https://github.com/mean-weasel/foil/releases/latest/download/appcast.xml"
  FoilDev:
    type: application
    platform: macOS
    sources: [Foil]
    settings:
      base:
        ENABLE_HARDENED_RUNTIME: YES
        MARKETING_VERSION: "1.12.2"
        CURRENT_PROJECT_VERSION: 34
        PRODUCT_NAME: "Foil Dev"
        PRODUCT_MODULE_NAME: Foil
        PRODUCT_BUNDLE_IDENTIFIER: com.neonwatty.Foil.Dev
        CODE_SIGN_ENTITLEMENTS: Foil/Foil.entitlements
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - package: Sparkle
    info:
      path: Foil/Info.plist
      properties:
        CFBundleDisplayName: "$(PRODUCT_NAME)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        NSMicrophoneUsageDescription: "Foil needs microphone access to record audio for speech-to-text."
        NSAppleEventsUsageDescription: "Foil uses Apple Events to pause browser media in Chrome and Chromium while recording, when you enable this experimental setting."
        SUFeedURL: "https://github.com/mean-weasel/foil/releases/latest/download/appcast.xml"
  FoilE2E:
    type: tool
    platform: macOS
    sources:
      - FoilE2E
      - Foil/AudioRecording.swift
      - Foil/AudioRecorder.swift
      - Foil/AppBrand.swift
      - Foil/TranscriptProcessingMode.swift
      - Foil/TranscriptionService.swift
    settings:
      base:
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_ALLOWED: NO
  FoilTests:
    type: bundle.unit-test
    platform: macOS
    sources: [FoilTests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - target: Foil
  FoilUITests:
    type: bundle.ui-testing
    platform: macOS
    sources: [FoilUITests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - target: Foil
