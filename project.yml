name: GroqTalk
options:
  bundleIdPrefix: com.neonwatty
  deploymentTarget:
    macOS: "14.0"
  minimumXcodeGenVersion: "2.0"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
targets:
  GroqTalk:
    type: application
    platform: macOS
    sources: [GroqTalk]
    settings:
      base:
        ENABLE_HARDENED_RUNTIME: YES
        MARKETING_VERSION: "1.8.2"
        CURRENT_PROJECT_VERSION: 32
        CODE_SIGN_ENTITLEMENTS: GroqTalk/GroqTalk.entitlements
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - package: Sparkle
    info:
      path: GroqTalk/Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: "GroqTalk needs microphone access to record audio for speech-to-text."
        SUFeedURL: "https://github.com/neonwatty/groqtalk/releases/latest/download/appcast.xml"
  GroqTalkTests:
    type: bundle.unit-test
    platform: macOS
    sources: [GroqTalkTests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - target: GroqTalk
  GroqTalkUITests:
    type: bundle.ui-testing
    platform: macOS
    sources: [GroqTalkUITests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - target: GroqTalk
