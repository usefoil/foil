name: GroqTalk
options:
  bundleIdPrefix: com.neonwatty
  deploymentTarget:
    macOS: "14.0"
  minimumXcodeGenVersion: "2.0"
targets:
  GroqTalk:
    type: application
    platform: macOS
    sources: [GroqTalk]
    settings:
      base:
        ENABLE_HARDENED_RUNTIME: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_ENTITLEMENTS: GroqTalk/GroqTalk.entitlements
        CODE_SIGN_IDENTITY: "-"
    info:
      path: GroqTalk/Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: "GroqTalk needs microphone access to record audio for speech-to-text."
  GroqTalkTests:
    type: bundle.unit-test
    platform: macOS
    sources: [GroqTalkTests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - target: GroqTalk
  GroqTalkUITests:
    type: bundle.ui-testing
    platform: macOS
    sources: [GroqTalkUITests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - target: GroqTalk
